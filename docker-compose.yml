services:
  vite-protocolo:
    build:
      context: ./vite-protocolo/
      dockerfile: Dockerfile
    volumes:
      - ./vite-protocolo:/app
    ports:
      - "5173:5173"
    env_file:
      - .env
    networks:
      - protocolo-network

  spring-protocolo:
    build:
      context: ./spring-protocolo/
      dockerfile: Dockerfile
    volumes:
      - ./spring-protocolo:/app
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - protocolo-network
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:8.1
    container_name: mysql-dev
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: protocolo
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - protocolo-network

# Volumes externos
volumes:
  mysql-data:

networks:
  protocolo-network:
    driver: bridge
